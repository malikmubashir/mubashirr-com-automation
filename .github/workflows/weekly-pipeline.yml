name: weekly-pipeline

on:
  schedule:
    # Times are UTC. France runs UTC+2 in summer, UTC+1 in winter.
    # The cron entries below assume CEST (summer). Adjust by -1h in winter.
    - cron: "0 7 * * WED"     # Scout      Wed 09:00 Paris (summer)
    - cron: "0 7 * * THU"     # Writer     Thu 09:00 Paris
    - cron: "0 9 * * THU"     # Visual     Thu 11:00 Paris
    - cron: "0 5 * * SAT"     # Publisher  Sat 07:00 Paris
    - cron: "0 7 * * SAT"     # Distributor Sat 09:00 Paris (after Publisher gate)
    - cron: "0 20 * * SUN"    # Archivist  Sun 22:00 Paris
  workflow_dispatch:
    inputs:
      agent:
        description: "Which agent to run (scout/writer/visual/publisher/distributor/archivist)"
        required: true

# Every job needs to commit its outputs back to the repo so the next
# agent (running on a different day) can read them via a fresh checkout.
permissions:
  contents: write

jobs:
  scout:
    if: github.event.schedule == '0 7 * * WED' || (github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'scout')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r pipeline/requirements.txt
      - name: run scout
        run: python -m pipeline.agents.scout
        env:
          EDAMAM_APP_ID: ${{ secrets.EDAMAM_APP_ID }}
          EDAMAM_APP_KEY: ${{ secrets.EDAMAM_APP_KEY }}
      - name: commit scout output
        run: |
          git config user.email "bot@mubashirr.com"
          git config user.name "mubashirr-bot"
          git add drafts/
          git diff --staged --quiet || git commit -m "scout: candidates for $(date -I)"
          git pull --rebase
          git push
      - uses: actions/upload-artifact@v4
        with:
          name: scout-${{ github.run_id }}
          path: drafts/

  writer:
    if: github.event.schedule == '0 7 * * THU' || (github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'writer')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r pipeline/requirements.txt
      - name: run writer
        run: python -m pipeline.agents.writer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
      - name: commit writer output
        run: |
          git config user.email "bot@mubashirr.com"
          git config user.name "mubashirr-bot"
          git add drafts/
          git diff --staged --quiet || git commit -m "writer: post draft for $(date -I)"
          git pull --rebase
          git push

  visual:
    if: github.event.schedule == '0 9 * * THU' || (github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'visual')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r pipeline/requirements.txt
      - name: run visual
        # Visual now only generates images and writes them to drafts/<date>/images/.
        # The host-side cron-pull PHP picks them up and sideloads into WP.
        # Direct REST upload from GH Actions is blocked by the host's origin
        # firewall (silent SYN drop on Azure egress).
        run: python -m pipeline.agents.visual
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          WP_SKIP_UPLOAD: "true"
      - name: commit visual output (images + meta)
        # PNG images are now committed (cron-pull reads them from the
        # local git checkout on the host). Small recipe blog, ~2MB/week, fine for git.
        run: |
          git config user.email "bot@mubashirr.com"
          git config user.name "mubashirr-bot"
          git add drafts/
          git diff --staged --quiet || git commit -m "visual: images generated for $(date -I)"
          git pull --rebase
          git push

  publisher:
    # Publisher is disabled. Publishing now happens via cron-pull PHP on the
    # WP host (see host/cron/mubashirr_pull.php). Keep this job stub for
    # workflow_dispatch in case we ever need to push a notification or run
    # a one-off REST call against WP from CI.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'publisher'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Publisher disabled in cron-pull architecture."
          echo "Drafts are committed to drafts/<date>/ and pulled by /home/mubashir/cron/mubashirr_pull.php on the WP host every 10 minutes."
          echo "Telegram notification is sent by the PHP script when a new draft is detected."

  distributor:
    if: github.event.schedule == '0 7 * * SAT' || (github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'distributor')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r pipeline/requirements.txt
      - name: run distributor
        run: python -m pipeline.agents.distributor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
      - name: commit distribution log
        run: |
          git config user.email "bot@mubashirr.com"
          git config user.name "mubashirr-bot"
          git add drafts/
          git diff --staged --quiet || git commit -m "distributor: social variants queued for $(date -I)"
          git pull --rebase
          git push

  archivist:
    if: github.event.schedule == '0 20 * * SUN' || (github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'archivist')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: |
          pip install -r pipeline/requirements.txt b2
          sudo apt-get update && sudo apt-get install -y age default-mysql-client
      - name: configure git
        run: |
          git config user.email "bot@mubashirr.com"
          git config user.name "mubashirr-bot"
      - name: run archivist
        run: python -m pipeline.agents.archivist
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
          AGE_RECIPIENT: ${{ secrets.AGE_RECIPIENT }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
